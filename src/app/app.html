<app-weather-background [weatherCondition]="currentWeather?.condition || null"></app-weather-background>

<div class="app-container">
  <header class="app-header">
    <h1>Weather App</h1>
  </header>

  <main class="app-main">
    <app-search-bar (search)="onSearch($event)" [isLoading]="isLoading" [error]="searchError"></app-search-bar>
    
    <app-weather-card 
      *ngIf="currentWeather"
      [weather]="currentWeather"
    ></app-weather-card>

    <div class="loading-state" *ngIf="isLoading && !currentWeather">
      <div class="spinner"></div>
      <p>Fetching weather...</p>
    </div>
  </main>
</div>
