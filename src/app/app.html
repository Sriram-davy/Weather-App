<app-weather-background [weatherCondition]="currentWeather?.condition || null"></app-weather-background>

<div class="app-container">
  <header class="app-header">
    <div class="title-wrapper">
      <h1 class="main-title">Weather App</h1>
      <p class="subtitle">Real-time forecasts with dynamic atmospheric effects</p>
    </div>
  </header>

  <main class="app-main">
    <button *ngIf="currentWeather" id="reset-button" class="reset-btn" (click)="resetApp()">
      ↩ Reset
    </button>
    
    <app-search-bar (search)="onSearch($event)" 
                    [isLoading]="isLoading" 
                    [error]="searchError"
                    [searchQuery]="searchQuery"></app-search-bar>
    
    <app-weather-card 
      *ngIf="currentWeather"
      [weather]="currentWeather"
    ></app-weather-card>

    <div class="loading-state" *ngIf="isLoading && !currentWeather">
      <div class="spinner"></div>
      <p>Fetching weather...</p>
    </div>
  </main>

  <footer class="app-footer">
    <p>Made by <strong>Sriram Davuluri</strong></p>
  </footer>
</div>
